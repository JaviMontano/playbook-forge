<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{DOC_TITLE}} | {{COMPANY_NAME}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="{{GOOGLE_FONTS_URL}}" rel="stylesheet">
<style>
:root {
  {{CSS_TOKENS}}
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body, 'Montserrat', sans-serif);
  background: var(--bg-soft, #F8FAFC);
  color: var(--charcoal, #1F2833);
  line-height: 1.65;
  font-size: 11pt;
}

h1, h2, h3, h4, h5 {
  font-family: var(--font-display, 'Poppins', sans-serif);
  font-weight: 700;
  line-height: 1.2;
  color: var(--navy, #122562);
}

a { color: var(--navy); text-decoration: none; }
a:hover { color: var(--gold-dark); text-decoration: underline; }

/* PAGE LAYOUT (A4) */
@page {
  size: A4;
  margin: 0;
}

.page {
  width: 210mm;
  min-height: 297mm;
  margin: 8mm auto;
  padding: 16mm 18mm 20mm;
  background: white;
  page-break-after: always;
  break-after: page;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-md, 0 4px 12px rgba(18,37,98,0.10));
  position: relative;
}

.page:last-child { page-break-after: auto; }

.page.dark {
  background: var(--navy);
  color: white;
}

.page.dark h1, .page.dark h2, .page.dark h3 { color: white; }

.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 8mm;
  margin-bottom: 8mm;
  border-bottom: 1px solid var(--border, rgba(18,37,98,0.12));
  font-family: var(--font-caption, 'Trebuchet MS', sans-serif);
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.page-body {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.page-footer {
  display: flex;
  justify-content: space-between;
  padding-top: 6mm;
  margin-top: auto;
  border-top: 1px solid var(--border);
  font-family: var(--font-caption);
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(18,37,98,0.6);
}

.page.dark .page-header,
.page.dark .page-footer {
  border-color: rgba(255,215,0,0.3);
  color: rgba(255,255,255,0.8);
}

/* COVER PAGE */
.cover-stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.cover-stage h1.display {
  font-size: 3.2rem;
  font-weight: 900;
  letter-spacing: -1px;
  margin-bottom: 1.5rem;
}

.ia-accent {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.cover-subtitle {
  font-size: 1.2rem;
  font-weight: 300;
  max-width: 70%;
  margin: 0 auto;
  opacity: 0.9;
}

.cover-marquee {
  display: flex;
  gap: 1rem;
  justify-content: center;
  padding: 8mm 0;
  border-top: 1px solid rgba(255,215,0,0.3);
  border-bottom: 1px solid rgba(255,215,0,0.3);
  font-family: var(--font-caption);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.cover-footer-band {
  display: flex;
  justify-content: space-between;
  margin-top: 8mm;
  font-size: 0.66rem;
  font-family: var(--font-caption);
  opacity: 0.7;
}

/* BRAND LOCKUP */
.brand-lockup {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--navy);
}

.page.dark .brand-lockup { color: white; }

.brand-lockup .ia { color: var(--gold); }

/* ATOC */
ol.atoc {
  list-style: none;
  counter-reset: atoc;
  margin: 1rem 0;
  padding: 0;
}

ol.atoc li {
  counter-increment: atoc;
  margin-bottom: 0.5rem;
}

ol.atoc li a {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  padding: 0.4rem 0.6rem;
  border-radius: 4px;
  color: var(--charcoal);
  transition: all 0.2s;
}

ol.atoc li a::before {
  content: counter(atoc, decimal-leading-zero) ".";
  color: var(--gold-dark);
  font-weight: 700;
  font-family: var(--font-display);
}

ol.atoc .ttl { flex-shrink: 0; }
ol.atoc .dots {
  flex: 1;
  border-bottom: 1px dotted rgba(18,37,98,0.3);
  margin: 0 0.5rem;
}
ol.atoc .pg {
  font-family: var(--font-caption);
  font-size: 0.85rem;
  color: rgba(18,37,98,0.6);
}

ol.atoc li a:hover {
  background: var(--bg-cream);
  padding-left: 1rem;
  text-decoration: none;
}

/* MINTO BLOCK */
.minto-block {
  background: var(--bg-cream, #FAFBFD);
  border-left: 3px solid var(--gold-dark);
  padding: 1.25rem 1.5rem;
  margin: 1rem 0;
}

.minto-block-label {
  font-family: var(--font-caption);
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--gold-dark);
  margin-bottom: 0.5rem;
}

.minto-block-conclusion {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--navy);
  margin-bottom: 1rem;
  line-height: 1.4;
}

ol.minto-soportes {
  list-style: none;
  counter-reset: minto;
  padding: 0;
}

ol.minto-soportes li {
  counter-increment: minto;
  padding: 0.5rem 0;
  border-bottom: 1px dashed var(--border);
  font-size: 0.92rem;
}

ol.minto-soportes li::before {
  content: counter(minto) ".";
  color: var(--gold-dark);
  font-weight: 700;
  margin-right: 0.5rem;
}

.minto-pilar-tag, .minto-ev-tag {
  display: inline-block;
  background: var(--navy);
  color: white;
  padding: 0.1rem 0.4rem;
  font-size: 0.6rem;
  font-family: var(--font-caption);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-radius: 2px;
  margin-left: 0.3rem;
}

.minto-ev-tag { background: var(--gold-dark); color: white; }

/* FUNNEL AUTHORITY */
.funnel-authority {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin: 1.5rem auto;
  max-width: 100%;
}

.funnel-stage {
  padding: 1rem 1.5rem;
  background: var(--bg-soft);
  border-left: 3px solid var(--navy);
  position: relative;
  font-size: 0.92rem;
}

.funnel-stage[data-tier="1"] { width: 100%; }
.funnel-stage[data-tier="2"] { width: 85%; margin: 0 auto; }
.funnel-stage[data-tier="3"] { width: 65%; margin: 0 auto; background: var(--bg-cream); border-left-color: var(--blue); }
.funnel-stage[data-tier="4"] {
  width: 48%;
  margin: 0 auto;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--navy);
  border-left-color: var(--navy);
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

.funnel-stage:not(:last-child)::after {
  content: "▼";
  position: absolute;
  bottom: -1.2rem;
  left: 50%;
  transform: translateX(-50%);
  color: var(--gold-dark);
  font-size: 0.8rem;
}

/* BRIDGE */
.bridge {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 1.5rem;
  align-items: center;
  margin: 1.5rem 0;
}

.bridge-pillar {
  padding: 1.25rem;
  background: var(--bg-cream);
  border-radius: 8px;
}

.bridge-pillar.left { border-left: 3px solid var(--blue); }
.bridge-pillar.right { border-right: 3px solid var(--gold); }

.bridge-label {
  font-family: var(--font-caption);
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--gold-dark);
  margin-bottom: 0.4rem;
}

.bridge-pillar h3 {
  font-size: 1rem;
  margin-bottom: 0.5rem;
}

.bridge-pillar p { font-size: 0.88rem; }

.bridge-span {
  display: flex;
  align-items: center;
  position: relative;
  min-width: 80px;
  justify-content: center;
}

.bridge-span::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 50%;
  height: 2px;
  background: linear-gradient(90deg, var(--navy), var(--gold), var(--navy));
}

.bridge-span-label {
  position: relative;
  background: white;
  padding: 0.2rem 0.5rem;
  font-family: var(--font-caption);
  font-size: 0.66rem;
  text-transform: uppercase;
  color: var(--gold-dark);
}

/* STAIRWAY */
.stairway {
  display: flex;
  align-items: flex-end;
  gap: 0.5rem;
  margin: 1.5rem 0;
  height: 180px;
}

.stair-step {
  flex: 1;
  background: var(--bg-cream);
  border-top: 3px solid var(--gold);
  padding: 0.75rem 0.6rem;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.stair-step[data-step="1"] { height: 60px; }
.stair-step[data-step="2"] { height: 90px; }
.stair-step[data-step="3"] { height: 120px; }
.stair-step[data-step="4"] { height: 150px; background: linear-gradient(180deg, var(--gold), var(--gold-dark)); -webkit-print-color-adjust: exact; print-color-adjust: exact; }

.stair-num {
  position: absolute;
  top: -8px;
  left: 4px;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1.2rem;
  color: var(--gold-dark);
}

.stair-title { font-weight: 700; font-size: 0.85rem; color: var(--navy); }
.stair-desc { font-size: 0.72rem; color: rgba(18,37,98,0.7); margin-top: 0.2rem; }

/* STAMP BOX */
.stamp-box {
  display: flex;
  justify-content: center;
  margin: 1rem 0;
}

.stamp-human {
  border: 3px double var(--navy);
  border-radius: 50%;
  width: 120px;
  height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transform: rotate(-8deg);
  background: white;
  text-align: center;
  font-family: var(--font-display);
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

.stamp-amount { font-size: 1.4rem; font-weight: 900; color: var(--navy); }
.stamp-label { font-size: 0.66rem; text-transform: uppercase; color: var(--gold-dark); letter-spacing: 1px; }

/* GO-SIGNAL */
.go-signal {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
  margin: 1rem 0;
}

.go-light {
  text-align: center;
  padding: 1rem;
  background: var(--bg-soft);
  border-radius: 8px;
}

.go-lamp {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  margin: 0 auto 0.5rem;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

.go-light[data-state="go"] .go-lamp { background: radial-gradient(circle, #16A34A 0%, #0A7B4D 100%); box-shadow: 0 0 12px rgba(22,163,74,0.5); }
.go-light[data-state="caution"] .go-lamp { background: radial-gradient(circle, #FBBF24 0%, #F59E0B 100%); box-shadow: 0 0 12px rgba(251,191,36,0.5); }
.go-light[data-state="no-go"] .go-lamp { background: radial-gradient(circle, #EF4444 0%, #C53030 100%); box-shadow: 0 0 12px rgba(239,68,68,0.5); }

.go-label {
  font-family: var(--font-display);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 0.3rem 0;
}

.go-criteria { font-size: 0.78rem; }

/* XREF STRIP */
.xref-strip {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  padding: 0.75rem 1rem;
  background: var(--bg-soft);
  border-left: 3px solid var(--gold);
  margin: 1rem 0;
}

.xref-strip::before {
  content: "Ver tambien:";
  font-family: var(--font-caption);
  font-size: 0.66rem;
  text-transform: uppercase;
  color: var(--gold-dark);
  letter-spacing: 1.5px;
  align-self: center;
}

.xref-chip {
  background: white;
  border: 1px solid var(--border);
  padding: 0.3rem 0.7rem;
  border-radius: 4px;
  font-size: 0.78rem;
  color: var(--navy);
  font-weight: 600;
  transition: all 0.2s;
}

.xref-chip:hover {
  background: var(--gold);
  border-color: var(--gold-dark);
  color: var(--navy);
  transform: translateY(-1px);
  text-decoration: none;
}

/* CALLOUT */
.callout {
  background: var(--bg-cream);
  border-left: 3px solid var(--gold);
  padding: 1rem 1.25rem;
  margin: 1rem 0;
}

.callout.warning { border-left-color: var(--warning); }
.callout.critical { border-left-color: var(--critical); }
.callout.positive { border-left-color: var(--positive); }

.callout-kicker {
  font-family: var(--font-caption);
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--gold-dark);
  margin-bottom: 0.4rem;
}

.callout .body { font-size: 0.92rem; color: var(--charcoal); }

/* PRICING TABLE */
.pricing-table {
  width: 100%;
  border-collapse: collapse;
  margin: 1rem 0;
  font-size: 0.88rem;
}

.pricing-table thead {
  background: var(--navy);
  color: white;
}

.pricing-table thead th {
  padding: 0.75rem;
  text-align: left;
  font-family: var(--font-caption);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}

.pricing-table tbody td {
  padding: 0.75rem;
  border-bottom: 1px solid var(--border);
}

.pricing-table tbody tr.total {
  border-top: 2px solid var(--gold);
  background: var(--bg-cream);
}

.pricing-table tbody tr.total td { font-weight: 700; }

.pricing-table tfoot td.pricing-note {
  padding: 0.75rem;
  font-size: 0.78rem;
  color: rgba(18,37,98,0.7);
  font-style: italic;
}

/* EVIDENCE BADGES */
.evbadge {
  display: inline-block;
  padding: 0.1rem 0.4rem;
  font-size: 0.6rem;
  font-family: var(--font-caption);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-radius: 2px;
  margin-left: 0.3rem;
}

.evbadge.sup { background: var(--positive); color: white; }
.evbadge.inf { background: var(--blue); color: white; }
.evbadge.doc { background: var(--gold-dark); color: white; }

/* ACCESSIBILITY */
.skip-link {
  position: absolute;
  top: -100px;
  left: 0;
  background: var(--navy);
  color: white;
  padding: 0.5rem 1rem;
  z-index: 999;
}

.skip-link:focus { top: 0; }

:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

/* PRINT */
@media print {
  body { background: white; }
  .page {
    margin: 0;
    box-shadow: none;
    width: auto;
    min-height: auto;
    page-break-after: always;
  }
  .page:last-child { page-break-after: auto; }

  h1, h2, h3, .h1, .h2, .h3 {
    page-break-after: avoid;
    break-after: avoid;
  }

  .minto-block, .minto-block-conclusion, .funnel-authority,
  .stairway, .stamp-box, .callout, .bridge, .go-signal {
    page-break-inside: avoid;
    break-inside: avoid;
  }

  .funnel-stage[data-tier="4"],
  .stair-step[data-step="4"],
  .xref-strip,
  .go-light .go-lamp,
  .stamp-human {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
}
</style>
</head>
<body{{BODY_LANG_CLASS}}>
<a class="skip-link" href="#main">Saltar al contenido</a>
<main id="main">
