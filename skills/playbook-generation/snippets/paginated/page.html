<section id="{{PAGE_ID}}" class="page {{PAGE_CLASSES}}">
  <div class="page-header">
    <div class="brand-lockup">
      {{BRAND_LOCKUP_HTML}}
    </div>
    <span class="page-meta">{{DOC_ID}}</span>
  </div>
  <div class="page-body">
    {{PAGE_CONTENT}}
  </div>
  <div class="page-footer">
    <span>{{COMPANY_NAME}} · {{DOC_ID}}</span>
    <span>{{PAGE_NUMBER}} / {{PAGE_TOTAL}}</span>
  </div>
</section>
