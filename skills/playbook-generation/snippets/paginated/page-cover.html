<section id="page-cover" class="page dark">
  <div class="page-header">
    <div class="brand-lockup">{{BRAND_LOCKUP_HTML}}</div>
    <span class="page-meta">{{DOC_ID}}</span>
  </div>
  <div class="cover-stage">
    <h1 class="display">{{COVER_TITLE_PRE}} <span class="ia-accent">{{COVER_TITLE_HIGHLIGHT}}</span></h1>
    <p class="cover-subtitle">{{COVER_SUBTITLE}}</p>
  </div>
  <div class="cover-marquee">
    <span>{{COVER_VERSION}}</span>
    <span>·</span>
    <span>{{COVER_DATE}}</span>
    <span>·</span>
    <span>{{COVER_CLIENT}}</span>
  </div>
  <div class="cover-footer-band">
    <span>{{COMPANY_NAME}} · {{COMPANY_URL}}</span>
    <span>{{COMPANY_COPYRIGHT}}</span>
  </div>
</section>
