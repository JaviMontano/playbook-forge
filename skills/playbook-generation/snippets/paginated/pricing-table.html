<table class="pricing-table">
  <thead>
    <tr>
      <th>{{COL_1}}</th>
      <th>{{COL_2}}</th>
      <th>{{COL_3}}</th>
      <th>{{COL_4}}</th>
    </tr>
  </thead>
  <tbody>
    {{PRICING_ROWS}}
    <tr class="total">
      <td><strong>{{TOTAL_LABEL}}</strong></td>
      <td><strong>{{TOTAL_PRICE}}</strong></td>
      <td>{{TOTAL_DURATION}}</td>
      <td><strong>{{TOTAL_DISCOUNT}}</strong></td>
    </tr>
  </tbody>
  <tfoot>
    <tr>
      <td colspan="4" class="pricing-note">{{PRICING_NOTE}}</td>
    </tr>
  </tfoot>
</table>
