<div class="jarvis-card clickable-card" style="max-width:none;" onclick="openModal('{{FLOW_NUM}}')">
  <div class="jarvis-card-header">
    <div class="jarvis-icon {{FLOW_ICON_CLASS}}" style="{{FLOW_ICON_STYLE}}">{{FLOW_ICON_TEXT}}</div>
    <h3>
      <span class="es">{{FLOW_NAME_ES}}</span><span class="en">{{FLOW_NAME_EN}}</span>
      <small><span class="es">{{FLOW_SUBTITLE_ES}}</span><span class="en">{{FLOW_SUBTITLE_EN}}</span></small>
    </h3>
  </div>
  <div class="jarvis-card-body">
    <div class="jf">
      <div class="jf-label"><span class="es">Cuando</span><span class="en">When</span></div>
      <div class="jf-value">
        <span class="es">{{FLOW_WHY_VALUE_ES}}</span><span class="en">{{FLOW_WHY_VALUE_EN}}</span>
      </div>
    </div>

    <div class="jf">
      <div class="jf-label"><span class="es">Secuencia Jarvis</span><span class="en">Jarvis Sequence</span></div>
      <div class="jf-value">
        <ol style="padding-left:1.2rem;margin:.5rem 0;">
          {{FLOW_EXERCISE_STEPS}}
        </ol>
      </div>
    </div>

    <div class="jf">
      <div class="jf-label"><span class="es">Salida</span><span class="en">Output</span></div>
      <div class="jf-value">
        <span class="es">{{FLOW_SUCCESS_VALUE_ES}}</span><span class="en">{{FLOW_SUCCESS_VALUE_EN}}</span>
      </div>
    </div>

    <div class="modal-cta" style="margin-top:1rem;">
      {{FLOW_CTA_LINKS}}
    </div>
  </div>
</div>
