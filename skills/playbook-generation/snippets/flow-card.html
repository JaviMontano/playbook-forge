<div class="jarvis-card" style="max-width:none;">
  <div class="jarvis-card-header">
    <div class="jarvis-icon {{FLOW_ICON_CLASS}}" style="{{FLOW_ICON_STYLE}}">{{FLOW_ICON_TEXT}}</div>
    <h3>{{FLOW_NAME}}<small>{{FLOW_SUBTITLE}}</small></h3>
  </div>
  <div class="jarvis-card-body">
    <div class="jf">
      <div class="jf-label">{{FLOW_WHY_LABEL}}</div>
      <div class="jf-value">{{FLOW_WHY_VALUE}}</div>
    </div>

    <div class="jf">
      <div class="jf-label">{{FLOW_EXERCISE_LABEL}}</div>
      <div class="jf-value">
        <ol style="padding-left:1.2rem;margin:.5rem 0;">
          {{FLOW_EXERCISE_STEPS}}
        </ol>
      </div>
    </div>

    <div class="jf">
      <div class="jf-label">{{FLOW_SUCCESS_LABEL}}</div>
      <div class="jf-value">{{FLOW_SUCCESS_VALUE}}</div>
    </div>
  </div>
</div>
