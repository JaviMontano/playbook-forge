<div class="modal-overlay" id="modal-{{MODAL_ID}}">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header">
      <h3><span class="es">{{MODAL_TITLE_ES}}</span><span class="en">{{MODAL_TITLE_EN}}</span></h3>
      <small><span class="es">{{MODAL_SUBTITLE_ES}}</span><span class="en">{{MODAL_SUBTITLE_EN}}</span></small>
    </div>
    <div class="modal-body">
      {{MODAL_BODY}}
    </div>
  </div>
</div>
