<div class="jarvis-card" style="max-width:none;">
  <div class="jarvis-card-header">
    <div class="jarvis-icon {{KATA_ICON_CLASS}}">{{KATA_ICON_TEXT}}</div>
    <h3>{{KATA_GEM_NAME}}<small>{{KATA_GEM_SUBTITLE}}</small></h3>
  </div>
  <div class="jarvis-card-body">
    <div class="jf">
      <div class="jf-label">{{KATA_WHY_LABEL}}</div>
      <div class="jf-value">{{KATA_WHY_VALUE}}</div>
    </div>

    <div class="jf">
      <div class="jf-label">{{KATA_EXERCISE_LABEL}}</div>
      <div class="jf-value">
        <ol style="padding-left:1.2rem;margin:.5rem 0;">
          {{KATA_EXERCISE_STEPS}}
        </ol>
      </div>
    </div>

    <div class="jf">
      <div class="jf-label">{{KATA_SUCCESS_LABEL}}</div>
      <div class="jf-value">{{KATA_SUCCESS_VALUE}}</div>
    </div>

    <div class="jf">
      <div class="jf-label">{{KATA_BEST_PRACTICE_LABEL}}</div>
      <div class="jf-value">{{KATA_BEST_PRACTICE_VALUE}}</div>
    </div>
  </div>
</div>

<div class="gate-box" style="margin-top:1.5rem;">{{KATA_CHECKPOINT}}</div>
