<div class="vraid-box">
  <h3>{{VRAID_TITLE}}</h3>
  <div class="vraid-letters">
    {{VRAID_LETTERS}}
  </div>
  <div class="vraid-note">{{VRAID_NOTE}}</div>

  <div class="callout" style="border-color:var(--sofka-orange);background:var(--sofka-orange-dim);margin-top:1.5rem;">
    <strong><span class="es">Regla de verificacion 3x3</span><span class="en">3x3 verification rule</span></strong>
    <p><span class="es">{{VRAID_3X3_RULE_ES}}</span><span class="en">{{VRAID_3X3_RULE_EN}}</span></p>
  </div>

  <div class="callout callout-info" style="margin-top:1rem;">
    <strong><span class="es">Test de firma</span><span class="en">Signature test</span></strong>
    <p><span class="es">{{VRAID_SIGNATURE_TEST_ES}}</span><span class="en">{{VRAID_SIGNATURE_TEST_EN}}</span></p>
  </div>
</div>
