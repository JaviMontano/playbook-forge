<!DOCTYPE html>
<html lang="{{META_LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{META_TITLE}} | {{META_COMPANY}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@400,500,600,700&display=swap" rel="stylesheet">
<style>
/* ═══ SOFKA DS v5.1 — Playbook Tokens ═══ */
:root {
  --sofka-orange: #FF7E08;
  --sofka-orange-light: #FF9E42;
  --sofka-orange-dark: #CC6506;
  --sofka-orange-dim: rgba(255,126,8,.10);
  --sofka-black: #000000;
  --sofka-white: #FFFFFF;
  --sofka-light: #EFEAE4;
  --sofka-positive: #FFD700;
  --sofka-positive-dim: rgba(255,215,0,.12);
  --sofka-positive-text: #B8860B;
  --sofka-warning: #D97706;
  --sofka-warning-dim: rgba(217,119,6,.08);
  --sofka-warning-border: rgba(217,119,6,.3);
  --sofka-critical: #DC2626;
  --sofka-critical-dim: rgba(220,38,38,.07);
  --sofka-critical-border: rgba(220,38,38,.25);
  --sofka-info: #2563EB;
  --sofka-info-dim: rgba(37,99,235,.07);
  --sofka-info-border: rgba(37,99,235,.25);
  --sofka-green: #42D36F;
  --sofka-teal: #06C8C8;
  --sofka-violet: #9747FF;
  --sofka-gray-50: #FAF8F6;
  --sofka-gray-100: #F4F0EC;
  --sofka-gray-200: #E4DED7;
  --sofka-gray-300: #D1C9BE;
  --sofka-gray-500: #6B6560;
  --sofka-gray-700: #333130;
  --sofka-gray-900: #111110;
  --font-display: 'Clash Grotesk', 'Inter', sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 6px 16px rgba(0,0,0,0.06);
  --max-w: 1100px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-body); background: var(--sofka-white); color: var(--sofka-gray-900); line-height: 1.65; font-size: 16px; }
h1,h2,h3,h4,h5 { font-family: var(--font-display); font-weight: 700; line-height: 1.2; }
a { color: var(--sofka-orange-dark); text-decoration: none; font-weight: 600; }
a:hover { text-decoration: underline; color: var(--sofka-orange); }
strong { color: var(--sofka-black); font-weight: 700; }
.skip-link { position: absolute; top: -100px; left: 0; background: var(--sofka-orange); color: #fff; padding: .5rem 1rem; z-index: 999; }
.skip-link:focus { top: 0; }
:focus-visible { outline: 2px solid var(--sofka-orange); outline-offset: 2px; }

/* NAV */
nav.toc { background: var(--sofka-gray-50); position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--sofka-gray-300); box-shadow: var(--shadow-sm); }
nav.toc .toc-inner { max-width: var(--max-w); margin: 0 auto; display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 2rem; align-items: center; }
nav.toc .toc-inner::-webkit-scrollbar { display: none; }
nav.toc .toc-logo { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--sofka-orange); padding: .75rem 1rem .75rem 0; white-space: nowrap; border-right: 1px solid var(--sofka-gray-300); margin-right: .5rem; }
nav.toc a { display: block; padding: .85rem 1rem; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--sofka-gray-500); white-space: nowrap; text-decoration: none; border-bottom: 3px solid transparent; transition: all .2s; }
nav.toc a:hover { color: var(--sofka-orange); border-bottom-color: var(--sofka-orange); text-decoration: none; }

/* HERO */
.hero { background: var(--sofka-black); position: relative; overflow: hidden; padding: 5rem 2rem 4rem; border-bottom: 8px solid var(--sofka-orange); }
.hero::before { content: ''; position: absolute; top: 0; right: -20%; width: 60%; height: 100%; background: radial-gradient(ellipse at 100% 50%, rgba(255,126,8,0.15) 0%, transparent 70%); pointer-events: none; }
.hero-inner { position: relative; z-index: 2; max-width: var(--max-w); margin: 0 auto; color: var(--sofka-white); }
.hero-logo { font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; color: var(--sofka-orange); margin-bottom: 1.5rem; letter-spacing: -1px; }
.hero-badges { display: flex; gap: .75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.hero-badge { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.85); padding: .35rem .9rem; border-radius: var(--radius-sm); font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.hero h1 { font-size: clamp(2rem, 5vw, 3.2rem); color: var(--sofka-white); margin-bottom: 1rem; }
.hero h1 span { color: var(--sofka-orange); }
.hero-sub { font-size: 1.1rem; color: rgba(255,255,255,.8); margin-bottom: 2rem; line-height: 1.7; max-width: 750px; }
.hero-kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem; }
.hero-kpi { text-align: center; }
.hero-kpi-icon { font-size: 1.6rem; margin-bottom: .4rem; }
.hero-kpi-value { font-family: var(--font-display); font-size: 2rem; font-weight: 700; line-height: 1; color: var(--sofka-orange); }
.hero-kpi-label { font-size: .72rem; color: rgba(255,255,255,.55); margin-top: .3rem; font-weight: 500; letter-spacing: .5px; }

/* MAIN */
main.container { max-width: var(--max-w); margin: 0 auto; padding: 3rem 2rem; }
main.container > section { margin-bottom: 3.5rem; }
.section-header { margin-bottom: 2rem; }
.section-header h2 { font-size: 2rem; color: var(--sofka-black); margin-bottom: .5rem; }
.section-header h2 span { color: var(--sofka-orange); }
.section-header p { color: var(--sofka-gray-500); font-size: 1.05rem; line-height: 1.7; max-width: 780px; }
.section-divider { border: none; border-top: 2px solid var(--sofka-gray-300); margin: 3rem 0; }

/* PROBLEM CARDS */
.problem-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 1.25rem; margin-top: 1.5rem; }
.problem-card { background: var(--sofka-gray-50); border-radius: var(--radius-md); padding: 1.5rem; border-left: 4px solid var(--sofka-critical); box-shadow: var(--shadow-card); transition: transform .2s, box-shadow .2s; }
.problem-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.problem-card h4 { font-size: .95rem; color: var(--sofka-critical); margin-bottom: .5rem; }
.problem-card p { font-size: .88rem; color: var(--sofka-gray-500); margin: 0; line-height: 1.6; }

/* ANTI-PATRON */
.antipatron { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1.5rem; align-items: stretch; margin-top: 2rem; }
.antipatron-col { background: var(--sofka-gray-50); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-sm); }
.antipatron-col.bad { border-top: 4px solid var(--sofka-critical); }
.antipatron-col.good { border-top: 4px solid var(--sofka-green); }
.antipatron-col h4 { font-size: .9rem; margin-bottom: .75rem; }
.antipatron-col.bad h4 { color: var(--sofka-critical); }
.antipatron-col.good h4 { color: #16A34A; }
.antipatron-col ul { list-style: none; padding: 0; margin: 0; }
.antipatron-col li { font-size: .85rem; color: var(--sofka-gray-700); padding: .35rem 0 .35rem 1.4rem; position: relative; }
.antipatron-col.bad li::before { content: "\2717"; position: absolute; left: 0; color: var(--sofka-critical); font-weight: 700; }
.antipatron-col.good li::before { content: "\2713"; position: absolute; left: 0; color: #16A34A; font-weight: 700; }
.antipatron-arrow { display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--sofka-orange); font-weight: 700; }

/* CYCLE */
.cycle-visual { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 2.5rem 0; }
.cycle-step { background: var(--sofka-gray-50); border: 2px solid var(--sofka-gray-200); border-radius: var(--radius-md); padding: 1.25rem 1rem; text-align: center; min-width: 150px; flex: 1; max-width: 190px; transition: border-color .2s, box-shadow .2s; }
.cycle-step:hover { border-color: var(--sofka-orange); box-shadow: 0 4px 16px rgba(255,126,8,.12); }
.cycle-step .step-num { width: 32px; height: 32px; border-radius: 50%; background: var(--sofka-orange); color: var(--sofka-white); font-weight: 800; font-size: .85rem; display: inline-flex; align-items: center; justify-content: center; margin-bottom: .6rem; }
.cycle-step .step-label { font-family: var(--font-display); font-size: .85rem; font-weight: 600; color: var(--sofka-gray-900); margin-bottom: .25rem; }
.cycle-step .step-jarvis { font-size: .75rem; color: var(--sofka-orange); font-weight: 700; }
.cycle-step .step-artifact { font-size: .72rem; color: var(--sofka-gray-500); margin-top: .25rem; }
.cycle-arrow { display: flex; align-items: center; color: var(--sofka-orange); font-size: 1.4rem; font-weight: 700; }

/* MAP TABLE */
.map-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-md); border: 1px solid var(--sofka-gray-300); }
.map-table th { background: var(--sofka-gray-900); color: var(--sofka-white); padding: .875rem 1.25rem; text-align: left; font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.map-table td { padding: .875rem 1.25rem; border-bottom: 1px solid var(--sofka-gray-200); background: var(--sofka-gray-50); color: var(--sofka-gray-900); font-size: .88rem; vertical-align: top; }
.map-table tr:hover td { background: var(--sofka-gray-100); }
.map-table .jarvis-name { color: var(--sofka-orange); font-weight: 700; }

/* JARVIS CARDS */
.jarvis-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
.jarvis-card { background: var(--sofka-gray-50); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-card); transition: box-shadow .2s, transform .2s; }
.jarvis-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.jarvis-card-header { padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--sofka-gray-200); display: flex; align-items: center; gap: .75rem; }
.jarvis-icon { width: 44px; height: 44px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; flex-shrink: 0; }
.jarvis-icon.lareu { background: var(--sofka-info-dim); color: var(--sofka-info); border: 1px solid var(--sofka-info-border); }
.jarvis-icon.lavuelta { background: var(--sofka-orange-dim); color: var(--sofka-orange); border: 1px solid rgba(255,126,8,.25); }
.jarvis-icon.elrepo { background: rgba(66,211,111,.1); color: #16A34A; border: 1px solid rgba(66,211,111,.25); }
.jarvis-icon.lainfo { background: rgba(151,71,255,.08); color: var(--sofka-violet); border: 1px solid rgba(151,71,255,.2); }
.jarvis-icon.laforja { background: var(--sofka-critical-dim); color: var(--sofka-critical); border: 1px solid var(--sofka-critical-border); }
.jarvis-card-header h3 { font-size: 1rem; font-weight: 700; color: var(--sofka-gray-900); }
.jarvis-card-header h3 small { display: block; font-size: .75rem; font-weight: 400; color: var(--sofka-gray-500); margin-top: .15rem; }
.jarvis-card-body { padding: 1.25rem 1.5rem; }
.jarvis-card-body > p { font-size: .88rem; color: var(--sofka-gray-500); margin-bottom: 1rem; line-height: 1.65; }
.jf { margin-bottom: 1rem; }
.jf-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--sofka-orange); margin-bottom: .2rem; }
.jf-value { font-size: .85rem; color: var(--sofka-gray-900); line-height: 1.55; }
.jf-prompt { background: var(--sofka-gray-100); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-sm); padding: .75rem 1rem; font-size: .82rem; color: var(--sofka-gray-700); font-style: italic; line-height: 1.5; }

/* TIMELINE */
.timeline { margin-top: 2rem; position: relative; padding-left: 2.5rem; }
.timeline::before { content: ''; position: absolute; left: .7rem; top: 0; bottom: 0; width: 3px; background: linear-gradient(to bottom, var(--sofka-orange), var(--sofka-info), var(--sofka-green), var(--sofka-violet)); border-radius: 2px; }
.timeline-item { position: relative; margin-bottom: 2rem; }
.timeline-dot { position: absolute; left: -2.5rem; top: .25rem; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .65rem; font-weight: 800; color: var(--sofka-white); z-index: 2; }
.timeline-item:nth-child(1) .timeline-dot { background: var(--sofka-orange); }
.timeline-item:nth-child(2) .timeline-dot { background: var(--sofka-info); }
.timeline-item:nth-child(3) .timeline-dot { background: #16A34A; }
.timeline-item:nth-child(4) .timeline-dot { background: var(--sofka-violet); }
.timeline-content { background: var(--sofka-gray-50); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-sm); }
.timeline-content h3 { font-size: 1rem; margin-bottom: .4rem; color: var(--sofka-gray-900); }
.timeline-content h3 .wk { color: var(--sofka-orange); }
.timeline-content .week-obj { font-size: .88rem; color: var(--sofka-gray-500); margin-bottom: 1rem; line-height: 1.6; }
.jtags { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: .75rem; }
.jtag { display: inline-block; padding: .25rem .75rem; border-radius: 16px; font-size: .7rem; font-weight: 600; border: 1px solid; }
.jtag.t-lareu { background: var(--sofka-info-dim); border-color: var(--sofka-info-border); color: var(--sofka-info); }
.jtag.t-lavuelta { background: var(--sofka-orange-dim); border-color: rgba(255,126,8,.25); color: var(--sofka-orange); }
.jtag.t-elrepo { background: rgba(66,211,111,.08); border-color: rgba(66,211,111,.2); color: #16A34A; }
.jtag.t-lainfo { background: rgba(151,71,255,.06); border-color: rgba(151,71,255,.18); color: var(--sofka-violet); }
.jtag.t-laforja { background: var(--sofka-critical-dim); border-color: var(--sofka-critical-border); color: var(--sofka-critical); }
.tl-deliverable { background: var(--sofka-orange-dim); border: 1px solid rgba(255,126,8,.2); border-radius: var(--radius-sm); padding: .75rem 1rem; font-size: .82rem; color: var(--sofka-gray-700); }
.tl-deliverable strong { color: var(--sofka-orange-dark); }

/* COMPARE */
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2rem; }
.compare-col { border-radius: var(--radius-md); padding: 1.75rem; }
.compare-col.before { background: var(--sofka-critical-dim); border: 1px solid var(--sofka-critical-border); }
.compare-col.after { background: rgba(66,211,111,.06); border: 1px solid rgba(66,211,111,.2); }
.compare-col h3 { font-size: 1.1rem; margin-bottom: 1rem; }
.compare-col.before h3 { color: var(--sofka-critical); }
.compare-col.after h3 { color: #16A34A; }
.compare-col ul { list-style: none; padding: 0; margin: 0; }
.compare-col li { padding: .5rem 0 .5rem 1.5rem; position: relative; font-size: .88rem; color: var(--sofka-gray-700); border-bottom: 1px solid rgba(0,0,0,.04); }
.compare-col.before li::before { content: "\2717"; position: absolute; left: 0; color: var(--sofka-critical); font-weight: 700; }
.compare-col.after li::before { content: "\2713"; position: absolute; left: 0; color: #16A34A; font-weight: 700; }

.metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; margin-top: 2rem; }
.metric-card { background: var(--sofka-gray-50); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-md); padding: 1.5rem; text-align: center; box-shadow: var(--shadow-sm); }
.metric-card .mv { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--sofka-orange); line-height: 1; }
.metric-card .ml { font-size: .78rem; color: var(--sofka-gray-500); margin-top: .35rem; }

/* SEMAFORO */
.semaforo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; margin-top: 1.5rem; }
.semaforo-card { border-radius: var(--radius-md); padding: 1.25rem; border-left: 5px solid; background: var(--sofka-gray-50); box-shadow: var(--shadow-sm); }
.semaforo-card.verde { border-left-color: var(--sofka-green); }
.semaforo-card.blanco { border-left-color: var(--sofka-gray-300); }
.semaforo-card.amarillo { border-left-color: var(--sofka-warning); }
.semaforo-card.rojo { border-left-color: var(--sofka-critical); }
.semaforo-card h4 { font-size: .9rem; margin-bottom: .35rem; }
.semaforo-card.verde h4 { color: #16A34A; }
.semaforo-card.blanco h4 { color: var(--sofka-gray-700); }
.semaforo-card.amarillo h4 { color: var(--sofka-warning); }
.semaforo-card.rojo h4 { color: var(--sofka-critical); }
.semaforo-card p { font-size: .82rem; color: var(--sofka-gray-500); margin: 0; line-height: 1.5; }

/* VR-AID BOX */
.vraid-box { margin-top: 2rem; background: var(--sofka-gray-50); border: 2px solid var(--sofka-orange); border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow-md); }
.vraid-box h3 { font-family: var(--font-display); font-size: 1.3rem; color: var(--sofka-orange-dark); margin-bottom: 1rem; }
.vraid-letters { display: flex; flex-wrap: wrap; gap: .75rem; margin-bottom: 1.5rem; }
.vraid-letter { background: var(--sofka-orange-dim); border: 1px solid rgba(255,126,8,.2); border-radius: var(--radius-md); padding: 1rem; flex: 1; min-width: 150px; }
.vraid-letter .letter { font-family: var(--font-display); font-size: 1.6rem; font-weight: 800; color: var(--sofka-orange); }
.vraid-letter .meaning { font-size: .8rem; color: var(--sofka-gray-700); }
.vraid-letter .feeds { font-size: .72rem; color: var(--sofka-info); margin-top: .25rem; font-weight: 600; }
.vraid-note { font-size: .88rem; color: var(--sofka-gray-700); line-height: 1.65; margin-top: .75rem; }
.vraid-note strong { color: var(--sofka-orange-dark); }

/* GEM LINKS */
.gem-link { display: inline-flex; align-items: center; gap: .4rem; background: var(--sofka-orange); color: var(--sofka-white); padding: .45rem 1rem; border-radius: var(--radius-sm); font-size: .78rem; font-weight: 700; text-decoration: none; transition: background .2s, transform .15s; letter-spacing: .3px; }
.gem-link:hover { background: var(--sofka-orange-dark); transform: translateY(-1px); text-decoration: none; color: var(--sofka-white); }
.gem-link::before { content: "\2B50"; font-size: .85rem; }
.gem-bar { display: flex; flex-wrap: wrap; gap: .75rem; margin-top: 2rem; padding: 1.5rem; background: var(--sofka-black); border-radius: var(--radius-lg); justify-content: center; }
.gem-bar-title { width: 100%; text-align: center; font-family: var(--font-display); font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,.5); margin-bottom: .25rem; }

/* CALLOUTS */
.callout { padding: 1.25rem 1.5rem; border-radius: var(--radius-md); margin: 1.5rem 0; border-left: 4px solid; }
.callout-warning { background: var(--sofka-warning-dim); border-color: var(--sofka-warning); }
.callout-info { background: var(--sofka-info-dim); border-color: var(--sofka-info); }
.callout-orange { background: var(--sofka-orange-dim); border-color: var(--sofka-orange); }
.callout strong { display: block; margin-bottom: .35rem; font-size: .88rem; }
.callout p, .callout li { font-size: .85rem; color: var(--sofka-gray-700); margin: 0; line-height: 1.55; }
.callout ul { list-style: disc; padding-left: 1.2rem; margin-top: .5rem; }
.callout li { margin-bottom: .25rem; }

/* DECISION MATRIX */
.decision-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-md); border: 1px solid var(--sofka-gray-300); font-size: .85rem; }
.decision-table th { background: var(--sofka-gray-900); color: var(--sofka-white); padding: .75rem 1rem; text-align: left; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.decision-table td { padding: .7rem 1rem; border-bottom: 1px solid var(--sofka-gray-200); background: var(--sofka-gray-50); color: var(--sofka-gray-900); vertical-align: top; }
.decision-table tr:hover td { background: var(--sofka-gray-100); }
