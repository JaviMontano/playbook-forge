<!DOCTYPE html>
<html lang="{{META_LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{META_TITLE}} | {{META_COMPANY}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@400,500,600,700&display=swap" rel="stylesheet">
<style>
/* ═══ SOFKA DS v5.1 — Playbook Tokens ═══ */
:root {
  --sofka-orange: #FF7E08;
  --sofka-orange-light: #FF9E42;
  --sofka-orange-dark: #CC6506;
  --sofka-orange-dim: rgba(255,126,8,.10);
  --sofka-black: #000000;
  --sofka-white: #FFFFFF;
  --sofka-light: #EFEAE4;
  --sofka-positive: #FFD700;
  --sofka-positive-dim: rgba(255,215,0,.12);
  --sofka-positive-text: #B8860B;
  --sofka-warning: #D97706;
  --sofka-warning-dim: rgba(217,119,6,.08);
  --sofka-warning-border: rgba(217,119,6,.3);
  --sofka-critical: #DC2626;
  --sofka-critical-dim: rgba(220,38,38,.07);
  --sofka-critical-border: rgba(220,38,38,.25);
  --sofka-info: #2563EB;
  --sofka-info-dim: rgba(37,99,235,.07);
  --sofka-info-border: rgba(37,99,235,.25);
  --sofka-accent-a: #42D36F;
  --sofka-accent-b: #06C8C8;
  --sofka-accent-c: #9747FF;
  --sofka-gray-50: #FAF8F6;
  --sofka-gray-100: #F4F0EC;
  --sofka-gray-200: #E4DED7;
  --sofka-gray-300: #D1C9BE;
  --sofka-gray-500: #6B6560;
  --sofka-gray-700: #333130;
  --sofka-gray-900: #111110;
  --font-display: 'Clash Grotesk', 'Inter', sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 6px 16px rgba(0,0,0,0.06);
  --max-w: 1100px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { font-family: var(--font-body); background: var(--sofka-white); color: var(--sofka-gray-900); line-height: 1.65; font-size: 16px; }
h1,h2,h3,h4,h5 { font-family: var(--font-display); font-weight: 700; line-height: 1.2; }
a { color: var(--sofka-orange-dark); text-decoration: none; font-weight: 600; }
a:hover { text-decoration: underline; color: var(--sofka-orange); }
strong { color: var(--sofka-black); font-weight: 700; }
.skip-link { position: absolute; top: -100px; left: 0; background: var(--sofka-orange); color: #fff; padding: .5rem 1rem; z-index: 999; }
.skip-link:focus { top: 0; }
:focus-visible { outline: 2px solid var(--sofka-orange); outline-offset: 2px; }

/* NAV */
nav.toc { background: var(--sofka-gray-50); position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--sofka-gray-300); box-shadow: var(--shadow-sm); }
nav.toc .toc-inner { max-width: var(--max-w); margin: 0 auto; display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 2rem; align-items: center; }
nav.toc .toc-inner::-webkit-scrollbar { display: none; }
nav.toc .toc-logo { display: flex; align-items: center; padding: .5rem 1rem .5rem 0; white-space: nowrap; border-right: 1px solid var(--sofka-gray-300); margin-right: .5rem; }
nav.toc .toc-logo img { height: 28px; width: auto; display: block; }
nav.toc .toc-logo span { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--sofka-orange); }
nav.toc a { display: block; padding: .85rem 1rem; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--sofka-gray-500); white-space: nowrap; text-decoration: none; border-bottom: 3px solid transparent; transition: all .2s; }
nav.toc a:hover { color: var(--sofka-orange); border-bottom-color: var(--sofka-orange); text-decoration: none; }

/* HERO */
.hero { background: var(--sofka-black); position: relative; overflow: hidden; padding: 5rem 2rem 4rem; border-bottom: 8px solid var(--sofka-orange); }
.hero::before { content: ''; position: absolute; top: 0; right: -20%; width: 60%; height: 100%; background: radial-gradient(ellipse at 100% 50%, rgba(255,126,8,0.15) 0%, transparent 70%); pointer-events: none; }
.hero-inner { position: relative; z-index: 2; max-width: var(--max-w); margin: 0 auto; color: var(--sofka-white); }
.hero-logo { margin-bottom: 1.5rem; }
.hero-logo img { height: 40px; width: auto; display: block; }
.hero-logo span { font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; color: var(--sofka-orange); letter-spacing: -1px; }
.hero-badges { display: flex; gap: .75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.hero-badge { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.85); padding: .35rem .9rem; border-radius: var(--radius-sm); font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.hero h1 { font-size: clamp(2rem, 5vw, 3.2rem); color: var(--sofka-white); margin-bottom: 1rem; }
.hero h1 span { color: var(--sofka-orange); }
.hero-sub { font-size: 1.1rem; color: rgba(255,255,255,.8); margin-bottom: 2rem; line-height: 1.7; max-width: 750px; }
.hero-kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem; }
.hero-kpi { text-align: center; }
.hero-kpi-icon { font-size: 1.6rem; margin-bottom: .4rem; }
.hero-kpi-value { font-family: var(--font-display); font-size: 2rem; font-weight: 700; line-height: 1; color: var(--sofka-orange); }
.hero-kpi-label { font-size: .72rem; color: rgba(255,255,255,.55); margin-top: .3rem; font-weight: 500; letter-spacing: .5px; }

/* MAIN */
main.container { max-width: var(--max-w); margin: 0 auto; padding: 3rem 2rem; }
main.container > section { margin-bottom: 3.5rem; }
.section-header { margin-bottom: 2rem; }
.section-header h2 { font-size: 2rem; color: var(--sofka-black); margin-bottom: .5rem; }
.section-header h2 span { color: var(--sofka-orange); }
.section-header p { color: var(--sofka-gray-500); font-size: 1.05rem; line-height: 1.7; max-width: 780px; }
.section-divider { border: none; border-top: 2px solid var(--sofka-gray-300); margin: 3rem 0; }

/* PROBLEM CARDS */
.problem-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 1.25rem; margin-top: 1.5rem; }
.problem-card { background: var(--sofka-gray-50); border-radius: var(--radius-md); padding: 1.5rem; border-left: 4px solid var(--sofka-critical); box-shadow: var(--shadow-card); transition: transform .2s, box-shadow .2s; }
.problem-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.problem-card h4 { font-size: .95rem; color: var(--sofka-critical); margin-bottom: .5rem; }
.problem-card p { font-size: .88rem; color: var(--sofka-gray-500); margin: 0; line-height: 1.6; }

/* ANTI-PATRON */
.antipatron { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1.5rem; align-items: stretch; margin-top: 2rem; }
.antipatron-col { background: var(--sofka-gray-50); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-sm); }
.antipatron-col.bad { border-top: 4px solid var(--sofka-critical); }
.antipatron-col.good { border-top: 4px solid var(--sofka-accent-a); }
.antipatron-col h4 { font-size: .9rem; margin-bottom: .75rem; }
.antipatron-col.bad h4 { color: var(--sofka-critical); }
.antipatron-col.good h4 { color: #16A34A; }
.antipatron-col ul { list-style: none; padding: 0; margin: 0; }
.antipatron-col li { font-size: .85rem; color: var(--sofka-gray-700); padding: .35rem 0 .35rem 1.4rem; position: relative; }
.antipatron-col.bad li::before { content: "\2717"; position: absolute; left: 0; color: var(--sofka-critical); font-weight: 700; }
.antipatron-col.good li::before { content: "\2713"; position: absolute; left: 0; color: #16A34A; font-weight: 700; }
.antipatron-arrow { display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--sofka-orange); font-weight: 700; }

/* CYCLE */
.cycle-visual { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 2.5rem 0; }
.cycle-step { background: var(--sofka-gray-50); border: 2px solid var(--sofka-gray-200); border-radius: var(--radius-md); padding: 1.25rem 1rem; text-align: center; min-width: 150px; flex: 1; max-width: 190px; transition: border-color .2s, box-shadow .2s; }
.cycle-step:hover { border-color: var(--sofka-orange); box-shadow: 0 4px 16px rgba(255,126,8,.12); }
.cycle-step .step-num { width: 32px; height: 32px; border-radius: 50%; background: var(--sofka-orange); color: var(--sofka-white); font-weight: 800; font-size: .85rem; display: inline-flex; align-items: center; justify-content: center; margin-bottom: .6rem; }
.cycle-step .step-label { font-family: var(--font-display); font-size: .85rem; font-weight: 600; color: var(--sofka-gray-900); margin-bottom: .25rem; }
.clickable-row{cursor:pointer;}
.cycle-step .step-artifact { font-size: .72rem; color: var(--sofka-gray-500); margin-top: .25rem; }
.cycle-arrow { display: flex; align-items: center; color: var(--sofka-orange); font-size: 1.4rem; font-weight: 700; }

/* MAP TABLE */
.map-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-md); border: 1px solid var(--sofka-gray-300); }
.map-table th { background: var(--sofka-gray-900); color: var(--sofka-white); padding: .875rem 1.25rem; text-align: left; font-size: .78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.map-table td { padding: .875rem 1.25rem; border-bottom: 1px solid var(--sofka-gray-200); background: var(--sofka-gray-50); color: var(--sofka-gray-900); font-size: .88rem; vertical-align: top; }
.map-table tr:hover td { background: var(--sofka-gray-100); }
.map-table .jarvis-name { color: var(--sofka-orange); font-weight: 700; }

/* JARVIS CARDS */
.jarvis-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
.jarvis-card { background: var(--sofka-gray-50); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-card); transition: box-shadow .2s, transform .2s; }
.jarvis-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.jarvis-card-header { padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--sofka-gray-200); display: flex; align-items: center; gap: .75rem; }
.jarvis-icon { width: 44px; height: 44px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; flex-shrink: 0; }
.jarvis-icon.lareu { background: var(--sofka-info-dim); color: var(--sofka-info); border: 1px solid var(--sofka-info-border); }
.jarvis-icon.lavuelta { background: var(--sofka-orange-dim); color: var(--sofka-orange); border: 1px solid rgba(255,126,8,.25); }
.jarvis-icon.elrepo { background: rgba(66,211,111,.1); color: #16A34A; border: 1px solid rgba(66,211,111,.25); }
.jarvis-icon.lainfo { background: rgba(151,71,255,.08); color: var(--sofka-accent-c); border: 1px solid rgba(151,71,255,.2); }
.jarvis-icon.laforja { background: var(--sofka-critical-dim); color: var(--sofka-critical); border: 1px solid var(--sofka-critical-border); }
.jarvis-card-header h3 { font-size: 1rem; font-weight: 700; color: var(--sofka-gray-900); }
.jarvis-card-header h3 small { display: block; font-size: .75rem; font-weight: 400; color: var(--sofka-gray-500); margin-top: .15rem; }
.jarvis-card-body { padding: 1.25rem 1.5rem; }
.jarvis-card-body > p { font-size: .88rem; color: var(--sofka-gray-500); margin-bottom: 1rem; line-height: 1.65; }
.jf { margin-bottom: 1rem; }
.jf-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--sofka-orange); margin-bottom: .2rem; }
.jf-value { font-size: .85rem; color: var(--sofka-gray-900); line-height: 1.55; }
.jf-prompt { background: var(--sofka-gray-100); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-sm); padding: .75rem 1rem; font-size: .82rem; color: var(--sofka-gray-700); font-style: italic; line-height: 1.5; }

/* USE-CASE CARDS (mirrors jarvis-card structure with distinct identity) */
.uc-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
.uc-card { background: var(--sofka-gray-50); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-card); transition: box-shadow .2s, transform .2s; cursor: pointer; }
.uc-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.uc-card-header { padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--sofka-gray-200); display: flex; align-items: center; gap: .75rem; }
.uc-icon { width: 44px; height: 44px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; flex-shrink: 0; background: var(--sofka-orange-dim); color: var(--sofka-orange); border: 1px solid rgba(255,126,8,.25); }
.uc-icon.infra { background: var(--sofka-info-dim); color: var(--sofka-info); border-color: var(--sofka-info-border); }
.uc-icon.mid { background: rgba(204,101,6,.08); color: var(--sofka-orange-dark); border-color: rgba(204,101,6,.25); }
.uc-icon.adv { background: var(--sofka-positive-dim); color: var(--sofka-positive-text); border-color: rgba(255,215,0,.3); }
.uc-card-header h3 { font-size: 1rem; font-weight: 700; color: var(--sofka-gray-900); }
.uc-card-header h3 small { display: block; font-size: .75rem; font-weight: 400; color: var(--sofka-gray-500); margin-top: .15rem; }
.uc-card-body { padding: 1.25rem 1.5rem; }
.uc-card-body p { font-size: .88rem; color: var(--sofka-gray-500); line-height: 1.65; margin: 0; }
.uc-tag { display: inline-block; padding: .2rem .6rem; border-radius: 12px; font-size: .68rem; font-weight: 600; margin-top: .5rem; }
.uc-tag.weekly { background: var(--sofka-critical-dim); color: var(--sofka-critical); border: 1px solid var(--sofka-critical-border); }
.uc-tag.governance { background: var(--sofka-info-dim); color: var(--sofka-info); border: 1px solid var(--sofka-info-border); }
.uc-tag.executive { background: var(--sofka-warning-dim); color: var(--sofka-warning); border: 1px solid var(--sofka-warning-border); }
.uc-tag.cumulative { background: var(--sofka-positive-dim); color: var(--sofka-positive-text); border: 1px solid rgba(255,215,0,.3); }

/* PROMPT LABEL */
.prompt-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--sofka-orange); margin-bottom: .25rem; }
.prompt-text { display: block; }

/* TIMELINE */
.timeline { margin-top: 2rem; position: relative; padding-left: 2.5rem; }
.timeline::before { content: ''; position: absolute; left: .7rem; top: 0; bottom: 0; width: 3px; background: linear-gradient(to bottom, var(--sofka-orange), var(--sofka-info), var(--sofka-accent-a), var(--sofka-accent-c)); border-radius: 2px; }
.timeline-item { position: relative; margin-bottom: 2rem; }
.timeline-dot { position: absolute; left: -2.5rem; top: .25rem; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .65rem; font-weight: 800; color: var(--sofka-white); z-index: 2; }
.timeline-item:nth-child(1) .timeline-dot { background: var(--sofka-orange); }
.timeline-item:nth-child(2) .timeline-dot { background: var(--sofka-info); }
.timeline-item:nth-child(3) .timeline-dot { background: #16A34A; }
.timeline-item:nth-child(4) .timeline-dot { background: var(--sofka-accent-c); }
.timeline-marker { font-family: var(--font-display); font-size: .78rem; font-weight: 700; color: var(--sofka-orange); margin-bottom: .35rem; }
.timeline-content { background: var(--sofka-gray-50); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-sm); }
.timeline-content h3 { font-size: 1rem; margin-bottom: .4rem; color: var(--sofka-gray-900); }
.timeline-content h3 .wk { color: var(--sofka-orange); }
.timeline-content .week-obj { font-size: .88rem; color: var(--sofka-gray-500); margin-bottom: 1rem; line-height: 1.6; }
.jtags { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: .75rem; }
.jtag { display: inline-block; padding: .25rem .75rem; border-radius: 16px; font-size: .7rem; font-weight: 600; border: 1px solid; }
.jtag.t-lareu { background: var(--sofka-info-dim); border-color: var(--sofka-info-border); color: var(--sofka-info); }
.jtag.t-lavuelta { background: var(--sofka-orange-dim); border-color: rgba(255,126,8,.25); color: var(--sofka-orange); }
.jtag.t-elrepo { background: rgba(66,211,111,.08); border-color: rgba(66,211,111,.2); color: #16A34A; }
.jtag.t-lainfo { background: rgba(151,71,255,.06); border-color: rgba(151,71,255,.18); color: var(--sofka-accent-c); }
.jtag.t-laforja { background: var(--sofka-critical-dim); border-color: var(--sofka-critical-border); color: var(--sofka-critical); }
.tl-deliverable { background: var(--sofka-orange-dim); border: 1px solid rgba(255,126,8,.2); border-radius: var(--radius-sm); padding: .75rem 1rem; font-size: .82rem; color: var(--sofka-gray-700); }
.tl-deliverable strong { color: var(--sofka-orange-dark); }

/* COMPARE */
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2rem; }
.compare-col { border-radius: var(--radius-md); padding: 1.75rem; }
.compare-col.before { background: var(--sofka-critical-dim); border: 1px solid var(--sofka-critical-border); }
.compare-col.after { background: rgba(66,211,111,.06); border: 1px solid rgba(66,211,111,.2); }
.compare-col h3 { font-size: 1.1rem; margin-bottom: 1rem; }
.compare-col.before h3 { color: var(--sofka-critical); }
.compare-col.after h3 { color: #16A34A; }
.compare-col ul { list-style: none; padding: 0; margin: 0; }
.compare-col li { padding: .5rem 0 .5rem 1.5rem; position: relative; font-size: .88rem; color: var(--sofka-gray-700); border-bottom: 1px solid rgba(0,0,0,.04); }
.compare-col.before li::before { content: "\2717"; position: absolute; left: 0; color: var(--sofka-critical); font-weight: 700; }
.compare-col.after li::before { content: "\2713"; position: absolute; left: 0; color: #16A34A; font-weight: 700; }

.metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; margin-top: 2rem; }
.metric-card { background: var(--sofka-gray-50); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-md); padding: 1.5rem; text-align: center; box-shadow: var(--shadow-sm); }
.metric-card .mv { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--sofka-orange); line-height: 1; }
.metric-card .ml { font-size: .78rem; color: var(--sofka-gray-500); margin-top: .35rem; }

/* SEMAFORO */
.semaforo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; margin-top: 1.5rem; }
.semaforo-card { border-radius: var(--radius-md); padding: 1.25rem; border-left: 5px solid; background: var(--sofka-gray-50); box-shadow: var(--shadow-sm); }
.semaforo-card.verde { border-left-color: var(--sofka-accent-a); }
.semaforo-card.blanco { border-left-color: var(--sofka-gray-300); }
.semaforo-card.amarillo { border-left-color: var(--sofka-warning); }
.semaforo-card.rojo { border-left-color: var(--sofka-critical); }
.semaforo-card h4 { font-size: .9rem; margin-bottom: .35rem; }
.semaforo-card.verde h4 { color: #16A34A; }
.semaforo-card.blanco h4 { color: var(--sofka-gray-700); }
.semaforo-card.amarillo h4 { color: var(--sofka-warning); }
.semaforo-card.rojo h4 { color: var(--sofka-critical); }
.semaforo-card p { font-size: .82rem; color: var(--sofka-gray-500); margin: 0; line-height: 1.5; }

/* VR-AID BOX */
.vraid-box { margin-top: 2rem; background: var(--sofka-gray-50); border: 2px solid var(--sofka-orange); border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow-md); }
.vraid-box h3 { font-family: var(--font-display); font-size: 1.3rem; color: var(--sofka-orange-dark); margin-bottom: 1rem; }
.vraid-letters { display: flex; flex-wrap: wrap; gap: .75rem; margin-bottom: 1.5rem; }
.vraid-letter { background: var(--sofka-orange-dim); border: 1px solid rgba(255,126,8,.2); border-radius: var(--radius-md); padding: 1rem; flex: 1; min-width: 150px; }
.vraid-letter .letter { font-family: var(--font-display); font-size: 1.6rem; font-weight: 800; color: var(--sofka-orange); }
.vraid-letter .meaning { font-size: .8rem; color: var(--sofka-gray-700); }
.vraid-letter .feeds { font-size: .72rem; color: var(--sofka-info); margin-top: .25rem; font-weight: 600; }
.vraid-note { font-size: .88rem; color: var(--sofka-gray-700); line-height: 1.65; margin-top: .75rem; }
.vraid-note strong { color: var(--sofka-orange-dark); }

/* GEM LINKS */
.gem-link { display: inline-flex; align-items: center; gap: .4rem; background: var(--sofka-orange); color: var(--sofka-white); padding: .45rem 1rem; border-radius: var(--radius-sm); font-size: .78rem; font-weight: 700; text-decoration: none; transition: background .2s, transform .15s; letter-spacing: .3px; }
.gem-link:hover { background: var(--sofka-orange-dark); transform: translateY(-1px); text-decoration: none; color: var(--sofka-white); }
.gem-link::before { content: "\2B50"; font-size: .85rem; }
.gem-bar { display: flex; flex-wrap: wrap; gap: .75rem; margin-top: 2rem; padding: 1.5rem; background: var(--sofka-black); border-radius: var(--radius-lg); justify-content: center; }
.gem-bar-title { width: 100%; text-align: center; font-family: var(--font-display); font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,.5); margin-bottom: .25rem; }

/* CALLOUTS */
.callout { padding: 1.25rem 1.5rem; border-radius: var(--radius-md); margin: 1.5rem 0; border-left: 4px solid; }
.callout-warning { background: var(--sofka-warning-dim); border-color: var(--sofka-warning); }
.callout-info { background: var(--sofka-info-dim); border-color: var(--sofka-info); }
.callout-orange { background: var(--sofka-orange-dim); border-color: var(--sofka-orange); }
.callout strong { display: block; margin-bottom: .35rem; font-size: .88rem; }
.callout p, .callout li { font-size: .85rem; color: var(--sofka-gray-700); margin: 0; line-height: 1.55; }
.callout ul { list-style: disc; padding-left: 1.2rem; margin-top: .5rem; }
.callout li { margin-bottom: .25rem; }

/* DECISION MATRIX */
.decision-table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-md); border: 1px solid var(--sofka-gray-300); font-size: .85rem; }
.decision-table th { background: var(--sofka-gray-900); color: var(--sofka-white); padding: .75rem 1rem; text-align: left; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.decision-table td { padding: .7rem 1rem; border-bottom: 1px solid var(--sofka-gray-200); background: var(--sofka-gray-50); color: var(--sofka-gray-900); vertical-align: top; }
.decision-table tr:hover td { background: var(--sofka-gray-100); }

/* GUARDRAIL */
.guardrail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
.guardrail-col { background: var(--sofka-gray-50); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-sm); }
.guardrail-col.si { border-top: 4px solid var(--sofka-accent-a); }
.guardrail-col.no { border-top: 4px solid var(--sofka-critical); }
.guardrail-col h4 { font-size: .9rem; margin-bottom: .75rem; }
.guardrail-col.si h4 { color: #16A34A; }
.guardrail-col.no h4 { color: var(--sofka-critical); }
.guardrail-col ul { list-style: none; padding: 0; margin: 0; }
.guardrail-col li { font-size: .82rem; color: var(--sofka-gray-700); padding: .3rem 0 .3rem 1.4rem; position: relative; }
.guardrail-col.si li::before { content: "\2713"; position: absolute; left: 0; color: #16A34A; font-weight: 700; }
.guardrail-col.no li::before { content: "\2717"; position: absolute; left: 0; color: var(--sofka-critical); font-weight: 700; }

/* GATE */
.gate-box { background: var(--sofka-black); border: 1px solid var(--sofka-positive); border-radius: var(--radius-md); padding: 1rem 1.25rem; margin-top: 1rem; font-family: 'Menlo','Monaco',monospace; font-size: .78rem; color: var(--sofka-positive); line-height: 1.5; white-space: pre-wrap; }

/* ANTI-USE */
.jf-antiuse { background: var(--sofka-critical-dim); border: 1px solid var(--sofka-critical-border); border-radius: var(--radius-sm); padding: .6rem .85rem; font-size: .78rem; color: var(--sofka-gray-700); margin-top: .5rem; }
.jf-antiuse strong { color: var(--sofka-critical); font-size: .72rem; text-transform: uppercase; letter-spacing: .5px; }

/* ACCEPTANCE */
.acceptance-list { list-style: none; padding: 0; margin: 1.5rem 0; counter-reset: acc; }
.acceptance-list li { padding: .75rem 1rem .75rem 3rem; position: relative; background: var(--sofka-gray-50); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-sm); margin-bottom: .5rem; font-size: .85rem; color: var(--sofka-gray-700); counter-increment: acc; }
.acceptance-list li::before { content: "CA-" counter(acc); position: absolute; left: .75rem; top: .75rem; font-family: var(--font-display); font-size: .7rem; font-weight: 700; color: var(--sofka-orange); }

/* TESTIMONIALS */
.testimonial-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
.testimonial { background: var(--sofka-gray-50); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-lg); padding: 1.75rem; box-shadow: var(--shadow-card); border-top: 4px solid var(--sofka-orange); }
.testimonial-quote { font-size: .95rem; color: var(--sofka-gray-700); line-height: 1.7; font-style: italic; margin-bottom: 1rem; }
.testimonial-author { font-size: .82rem; font-weight: 700; color: var(--sofka-orange-dark); }
.testimonial-role { font-size: .72rem; color: var(--sofka-gray-500); }
.case-highlight { background: var(--sofka-orange-dim); border: 2px solid var(--sofka-orange); border-radius: var(--radius-lg); padding: 2rem; margin-top: 2rem; display: grid; grid-template-columns: auto 1fr; gap: 1.5rem; align-items: center; }
.case-metric { text-align: center; }
.case-metric .big { font-family: var(--font-display); font-size: 3rem; font-weight: 800; color: var(--sofka-orange); line-height: 1; }
.case-metric .unit { font-size: .8rem; color: var(--sofka-orange-dark); font-weight: 600; }
.case-detail h4 { font-size: 1.1rem; color: var(--sofka-gray-900); margin-bottom: .5rem; }
.case-detail p { font-size: .9rem; color: var(--sofka-gray-700); margin: 0; line-height: 1.65; }
.recommendations { margin-top: 2rem; }
.rec-card { background: var(--sofka-gray-50); border-left: 4px solid var(--sofka-info); border-radius: var(--radius-md); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow-sm); }
.rec-card h4 { font-size: .9rem; color: var(--sofka-info); margin-bottom: .35rem; }
.rec-card p { font-size: .85rem; color: var(--sofka-gray-700); margin: 0; line-height: 1.55; }

/* FOOTER */
footer.site-footer { background: var(--sofka-black); border-top: 8px solid var(--sofka-orange); color: var(--sofka-white); padding: 2.5rem 2rem 2rem; }
footer.site-footer .footer-inner { max-width: var(--max-w); margin: 0 auto; }
.footer-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
.footer-logo { display: flex; align-items: center; }
.footer-logo img { height: 32px; width: auto; display: block; }
.footer-logo span { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: var(--sofka-orange); }
.footer-badges { display: flex; gap: .75rem; flex-wrap: wrap; }
.footer-badge { background: rgba(255,126,8,.15); color: var(--sofka-orange); padding: .3rem .75rem; border-radius: var(--radius-sm); font-size: .72rem; font-weight: 600; }
.footer-bottom { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,.1); font-size: .75rem; color: rgba(255,255,255,.45); }

/* ═══ PROMPT COPYABLE ═══ */
.prompt-copyable { position: relative; background: var(--sofka-gray-900); color: #e2e8f0; border-radius: var(--radius-md); padding: 1.25rem 3.5rem 1.25rem 1.5rem; font-family: 'Courier New', monospace; font-size: .85rem; line-height: 1.7; margin: 1rem 0; white-space: pre-wrap; word-wrap: break-word; }
.prompt-copyable .param { color: var(--sofka-orange); font-weight: 700; }
.prompt-copyable .copy-btn { position: absolute; top: .75rem; right: .75rem; background: var(--sofka-orange); color: white; border: none; border-radius: var(--radius-sm); padding: .35rem .75rem; font-size: .72rem; font-weight: 700; cursor: pointer; transition: background .2s; letter-spacing: .3px; }
.prompt-copyable .copy-btn:hover { background: var(--sofka-orange-dark); }
.prompt-copyable .copy-btn.copied { background: #16a34a; }
.prompt-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--sofka-orange); margin-bottom: .25rem; }

/* ═══ JARVIS TOOL TAGS ═══ */
.jtags { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .5rem; }
.jtag { display: inline-block; padding: .15rem .55rem; border-radius: 16px; font-size: .68rem; font-weight: 600; border: 1px solid; }
.jtag.t-lareu { background: var(--sofka-info-dim); color: var(--sofka-info); border-color: var(--sofka-info-border); }
.jtag.t-lavuelta { background: var(--sofka-orange-dim); color: var(--sofka-orange); border-color: rgba(255,126,8,.25); }
.jtag.t-elrepo { background: rgba(66,211,111,.08); color: #16A34A; border-color: rgba(66,211,111,.2); }
.jtag.t-lainfo { background: rgba(151,71,255,.06); color: var(--sofka-accent-c); border-color: rgba(151,71,255,.18); }
.jtag.t-laforja { background: var(--sofka-critical-dim); color: var(--sofka-critical); border-color: var(--sofka-critical-border); }
.jtag.t-drive { background: var(--sofka-info-dim); color: var(--sofka-info); border-color: var(--sofka-info-border); }
.jtag.t-nlm { background: rgba(139,92,42,.08); color: #8B5C2A; border-color: rgba(139,92,42,.2); }
.jtag.t-gemini { background: var(--sofka-positive-dim); color: var(--sofka-positive-text); border-color: rgba(255,215,0,.3); }
.jtag.t-dr { background: var(--sofka-warning-dim); color: var(--sofka-warning); border-color: var(--sofka-warning-border); }

/* ═══ TIMELINE DELIVERABLE ═══ */
.tl-deliverable { background: var(--sofka-orange-dim); border: 1px solid rgba(255,126,8,.2); border-radius: var(--radius-sm); padding: .5rem .75rem; margin-top: .5rem; font-size: .82rem; }
.tl-deliverable strong { color: var(--sofka-orange-dark); }
/* ═══ PRODUCTION ECOSYSTEM — Base definitions (overridden by v5 block below if present) ═══ */
.prompt-card-top { display: flex; align-items: center; gap: .6rem; }
.prompt-card-title { font-family: var(--font-display); font-weight: 700; font-size: .92rem; color: var(--sofka-gray-900); }
.prompt-card-dest { font-size: .72rem; color: var(--sofka-gray-500); }
.prompt-card-desc { font-size: .8rem; color: var(--sofka-gray-500); line-height: 1.5; }
.prompt-card-tags { display: flex; gap: .4rem; flex-wrap: wrap; }
.prompt-card:hover .prompt-card-num { background: var(--sofka-orange-dark); }
.arch-box { background: var(--sofka-gray-50); border: 2px solid var(--sofka-gray-200); border-radius: var(--radius-lg); padding: 2rem; margin: 2rem 0; }
.arch-layers { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }
.arch-layer .arch-emoji { font-size: 2rem; margin-bottom: .5rem; }
.arch-layer .arch-name { font-family: var(--font-display); font-weight: 700; font-size: 1rem; margin-bottom: .25rem; }
.arch-layer .arch-desc { font-size: .82rem; color: var(--sofka-gray-500); line-height: 1.5; }
.folder-tree .archive { color: var(--sofka-gray-500); }
.naming-part { display: inline-block; padding: .2rem .5rem; border-radius: var(--radius-sm); margin: 0 .15rem; font-size: 1rem; }
.naming-part.date { background: var(--sofka-info-dim); color: var(--sofka-info); }
.naming-part.project { background: var(--sofka-orange-dim); color: var(--sofka-orange); }
.naming-part.desc { background: var(--sofka-positive-dim); color: var(--sofka-positive-text); }
.naming-part.ext { background: var(--sofka-gray-200); color: var(--sofka-gray-700); }
.analogy-card .analogy-icon { font-size: 1.5rem; margin-bottom: .5rem; }
.analogy-card .analogy-rule { font-family: var(--font-display); font-weight: 700; font-size: .95rem; color: var(--sofka-gray-900); margin-bottom: .5rem; }
.analogy-card .analogy-why { font-size: .85rem; color: var(--sofka-gray-500); line-height: 1.6; }
.callout-critical { border-left-color: var(--sofka-critical); background: var(--sofka-critical-dim); }
.lang-toggle { margin-left: auto; padding: .5rem .75rem; font-size: .72rem; font-weight: 700; background: var(--sofka-orange-dim); color: var(--sofka-orange); border: 1px solid rgba(255,126,8,.25); border-radius: var(--radius-sm); cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
.lang-toggle:hover { background: var(--sofka-orange); color: var(--sofka-white); }

/* RESPONSIVE */
@media (max-width: 768px) {
  .hero { padding: 3rem 1rem; }
  .hero-kpis { grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  .hero-kpi-value { font-size: 1.6rem; }
  main.container { padding: 2rem 1rem; }
  .antipatron { grid-template-columns: 1fr; }
  .antipatron-arrow { transform: rotate(90deg); justify-self: center; }
  .compare-grid { grid-template-columns: 1fr; }
  .jarvis-cards { grid-template-columns: 1fr; }
  .uc-cards { grid-template-columns: 1fr; }
  .prompt-cards-grid { grid-template-columns: 1fr; }
  .analogy-grid { grid-template-columns: 1fr; }
  .ruta-grid { grid-template-columns: repeat(3, 1fr); }
  .cycle-arrow { display: none; }
  .cycle-step { max-width: none; }
  .semaforo-grid { grid-template-columns: repeat(2, 1fr); }
  .metrics-row { grid-template-columns: repeat(2, 1fr); }
  nav.toc .toc-inner { padding: 0 1rem; }
  .hero-kpis { grid-template-columns: repeat(2, 1fr); }
  .modal-box{max-height:90vh;border-radius:var(--radius-lg);}
  .apm-equation{grid-template-columns:1fr;}
  .apm-op{font-size:1.5rem;}
  .arch-layers { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .hero-kpis { grid-template-columns: 1fr; }
  .semaforo-grid { grid-template-columns: 1fr; }
  .metrics-row { grid-template-columns: 1fr 1fr; }
  .ruta-grid { grid-template-columns: repeat(2, 1fr); }
}

/* PRINT */
@media print {
  * { background: transparent !important; color: #000 !important; box-shadow: none !important; }
  html { font-size: 11pt; }
  body { margin: 0; padding: 1cm; }
  .hero { border-bottom: 2px solid #000; page-break-after: always; padding: 2rem 0; }
  .hero::before { display: none; }
  nav.toc, .skip-link { display: none; }
  main.container { padding: 0; max-width: none; }
  .jarvis-card, .uc-card, .problem-card, .timeline-content, .semaforo-card, .compare-col, .vraid-box, .metric-card, .callout, .testimonial, .case-highlight, .guardrail-col, .rec-card, .gate-box { page-break-inside: avoid; border: 1px solid #000; padding: .75rem; margin: .5cm 0; }
  footer.site-footer { border-top: 2px solid #000; page-break-before: always; }
  .modal-overlay{display:none!important;}
  .prompt-card, .analogy-card, .ruta-card, .naming-box, .folder-tree, .arch-layer { page-break-inside: avoid; border: 1px solid #000; }
  .ruta-card.current { background: #f0f0f0 !important; border: 2px solid #000 !important; }
  .gcal-link { display: none !important; }
}
@media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }

/* ═══ MODAL SYSTEM ═══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;padding:1.5rem;backdrop-filter:blur(4px);}
.modal-overlay.active{display:flex;}
.modal-box{background:var(--sofka-white);border-radius:var(--radius-xl);max-width:700px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.25);position:relative;animation:modalIn .25s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-header{padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--sofka-gray-200);position:sticky;top:0;background:var(--sofka-white);z-index:1;border-radius:var(--radius-xl) var(--radius-xl) 0 0;}
.modal-header h3{font-size:1.15rem;color:var(--sofka-gray-900);margin:0;}
.modal-header small{display:block;font-size:.78rem;color:var(--sofka-gray-500);margin-top:.2rem;font-weight:400;}
.modal-close{position:absolute;top:1rem;right:1rem;width:32px;height:32px;border-radius:50%;border:none;background:var(--sofka-gray-100);color:var(--sofka-gray-700);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{background:var(--sofka-critical);color:var(--sofka-white);}
.modal-body{padding:1.5rem;}
.modal-body .jf{margin-bottom:1rem;}
.modal-cta{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--sofka-gray-200);}
.modal-cta .gem-link{font-size:.82rem;}

/* ═══ CLICKABLE CARDS ═══ */
.clickable-card{cursor:pointer;position:relative;transition:box-shadow .2s,transform .18s;}
.clickable-card::before{content:'';position:absolute;inset:0;border-radius:inherit;border:2px solid transparent;transition:border-color .2s;pointer-events:none;}
.clickable-card:hover{box-shadow:0 6px 20px rgba(255,126,8,.18),0 2px 8px rgba(0,0,0,.08)!important;transform:translateY(-2px);}
.clickable-card:hover::before{border-color:var(--sofka-orange);}

/* ═══ INTERACTIVE TABLE ROWS ═══ */
.map-table tbody tr[onclick]{transition:background .15s,box-shadow .15s,transform .12s;}
.map-table tbody tr[onclick]:hover{background:rgba(255,126,8,.14)!important;box-shadow:inset 4px 0 0 var(--sofka-orange);}
.map-table tbody tr[onclick]:hover td{color:var(--sofka-gray-900);}

/* ═══ BILINGUAL TOGGLE ═══ */
body.lang-es .en{display:none!important;}
body.lang-en .es{display:none!important;}
.lang-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.85);padding:.35rem .9rem;border-radius:var(--radius-sm);font-size:.75rem;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:background .2s;white-space:nowrap;font-family:var(--font-body);}
.lang-btn:hover{background:var(--sofka-orange);color:var(--sofka-white);}
nav .lang-btn{background:transparent;border:1px solid var(--sofka-gray-300);color:var(--sofka-gray-700);padding:.4rem .75rem;margin-left:auto;flex-shrink:0;}
nav .lang-btn:hover{background:var(--sofka-orange);color:var(--sofka-white);border-color:var(--sofka-orange);}

/* ═══ APM EQUATION ═══ */
.apm-equation{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:1rem;align-items:start;margin:1.5rem 0;}
.apm-col{background:var(--sofka-gray-50);border-radius:var(--radius-md);padding:1.25rem 1rem;}
.apm-col-title{font-family:var(--font-display);font-size:.9rem;font-weight:700;color:var(--sofka-orange);margin-bottom:.5rem;}
.apm-op{display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--sofka-orange);}

/* ═══ REVEAL/EXPAND ═══ */
.reveal-trigger{display:none;}
.reveal-label{display:inline-flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.82rem;font-weight:600;color:var(--sofka-orange);padding:.4rem .75rem;background:var(--sofka-orange-dim);border-radius:var(--radius-sm);transition:background .2s;margin-top:.75rem;}
.reveal-label:hover{background:rgba(255,126,8,.18);}
.reveal-label::after{content:"▸";transition:transform .3s;}
.reveal-trigger:checked+.reveal-label::after{transform:rotate(90deg);}
.reveal-box{max-height:0;overflow:hidden;opacity:0;padding:0 1rem;transition:max-height .4s ease,opacity .3s ease,padding .3s ease;}
.reveal-trigger:checked~.reveal-box{max-height:2000px;opacity:1;padding:1rem;}

/* ═══ PLATFORM BADGE ═══ */
.platform-badge{display:inline-block;padding:.3rem .8rem;border-radius:var(--radius-sm);font-size:.72rem;font-weight:600;border:2px solid var(--sofka-gray-300);color:var(--sofka-gray-700);background:var(--sofka-gray-50);letter-spacing:.3px;}

/* ═══ PULSE ANIMATION ═══ */
@keyframes pulse-glow{0%,100%{box-shadow:0 0 0 0 rgba(255,126,8,.4);}50%{box-shadow:0 0 0 8px rgba(255,126,8,0);}}
.pulse{animation:pulse-glow 2s ease-in-out infinite;}

/* ═══ FORENSIC ANALYSIS COMPONENTS ═══ */

/* EVIDENCE TAGS */

/* SEVERITY BADGES */

/* DIMENSION CARDS */
.dimension-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.25rem; margin-top: 2rem; }

/* MATURITY SCORE BAR */
.maturity-bar { display: flex; align-items: center; gap: .5rem; margin: .75rem 0; }
.maturity-bar-track { flex: 1; height: 8px; background: var(--sofka-gray-200); border-radius: 4px; overflow: hidden; }
.maturity-bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }

.maturity-bar-fill.level-3 { width: 60%; background: var(--sofka-positive); }
.maturity-bar-fill.level-4 { width: 80%; background: var(--sofka-accent-a); }
.maturity-bar-fill.level-5 { width: 100%; background: var(--sofka-info); }
.maturity-score { font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; color: var(--sofka-orange); min-width: 2rem; text-align: right; }

/* FINDING CARDS */
.finding-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-top: 1.5rem; }
.finding-card { background: var(--sofka-gray-50); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-md); padding: 1.25rem 1.5rem; box-shadow: var(--shadow-sm); transition: transform .2s, box-shadow .2s; border-left: 4px solid var(--sofka-gray-300); }

.finding-card.critical { border-left-color: var(--sofka-critical); }
.finding-card.high { border-left-color: var(--sofka-warning); }
.finding-card.medium { border-left-color: var(--sofka-positive); }

.finding-card p { font-size: .85rem; color: var(--sofka-gray-500); line-height: 1.6; margin: 0; }
.finding-impact { font-size: .82rem; color: var(--sofka-gray-700); margin-top: .5rem; padding-top: .5rem; border-top: 1px solid var(--sofka-gray-200); }
.finding-impact strong { color: var(--sofka-critical); font-size: .72rem; text-transform: uppercase; letter-spacing: .5px; }

/* RISK MAP */
.risk-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.25rem; margin-top: 1.5rem; }
.risk-card { background: var(--sofka-gray-50); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-md); padding: 1.25rem; box-shadow: var(--shadow-sm); }

.risk-probability, .risk-impact { display: inline-block; padding: .15rem .5rem; border-radius: 3px; font-size: .65rem; font-weight: 700; text-transform: uppercase; }

/* RADAR CHART (text representation) */
.radar-box { background: var(--sofka-gray-50); border: 2px solid var(--sofka-orange); border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow-md); margin-top: 2rem; }

.radar-dimension .dim-name { font-size: .82rem; font-weight: 600; color: var(--sofka-gray-900); flex: 1; }

/* RECOMMENDATION TIMELINE */
.rec-timeline { margin-top: 2rem; }

.rec-phase-badge { padding: .35rem .9rem; border-radius: var(--radius-sm); font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.rec-phase-badge.quick { background: var(--sofka-accent-a); color: var(--sofka-white); }
.rec-phase-badge.short { background: var(--sofka-info); color: var(--sofka-white); }

/* STAKEHOLDER CARDS */

.stakeholder-card { background: var(--sofka-gray-50); border: 1px solid var(--sofka-gray-200); border-radius: var(--radius-md); padding: 1.25rem; text-align: center; box-shadow: var(--shadow-sm); }
.stakeholder-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--sofka-orange-dim); color: var(--sofka-orange); display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; margin-bottom: .75rem; }
.stakeholder-card h4 { font-size: .9rem; color: var(--sofka-gray-900); margin-bottom: .2rem; }

/* METHODOLOGY BADGE */
.method-badge { display: inline-flex; align-items: center; gap: .35rem; padding: .25rem .75rem; border-radius: 16px; font-size: .72rem; font-weight: 600; }
.method-badge.forensic { background: rgba(37,99,235,.08); color: var(--sofka-info); border: 1px solid var(--sofka-info-border); }
.method-badge.conversational { background: var(--sofka-orange-dim); color: var(--sofka-orange); border: 1px solid rgba(255,126,8,.25); }
.method-badge.multidimensional { background: rgba(151,71,255,.06); color: var(--sofka-accent-c); border: 1px solid rgba(151,71,255,.18); }

/* EXECUTIVE SUMMARY HIGHLIGHT */
.exec-highlight { background: linear-gradient(135deg, var(--sofka-black) 0%, var(--sofka-gray-900) 100%); border-radius: var(--radius-xl); padding: 2.5rem; color: var(--sofka-white); margin-top: 2rem; border: 1px solid rgba(255,126,8,.2); }
.exec-highlight h3 { font-size: 1.4rem; color: var(--sofka-orange); margin-bottom: 1.25rem; }

.exec-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1.25rem; margin-top: 1.5rem; }
.exec-kpi { text-align: center; padding: 1rem; background: rgba(255,255,255,.05); border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,.08); }

.fte-disclaimer { background: var(--sofka-warning-dim); border: 1px solid var(--sofka-warning-border); border-radius: var(--radius-sm); padding: .75rem 1rem; font-size: .78rem; color: var(--sofka-gray-700); margin-top: 1rem; }

@media (max-width: 768px) {
