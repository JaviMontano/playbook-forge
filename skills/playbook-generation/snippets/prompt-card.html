<!-- PROMPT CARD: Interactive card that opens modal with full prompt -->
<div class="problem-card tip-card clickable-card" style="border-left-color:{{CARD_COLOR}};cursor:pointer;" onclick="openModal('{{CARD_MODAL_ID}}')" role="button" tabindex="0">
  <h4 style="color:{{CARD_COLOR}};">{{CARD_ICON}} <span class="es">{{CARD_TITLE_ES}}</span><span class="en">{{CARD_TITLE_EN}}</span></h4>
  <p><span class="es">{{CARD_DESC_ES}}</span><span class="en">{{CARD_DESC_EN}}</span></p>
  <div class="prompt-label"><span class="es">Prompt listo para copiar</span><span class="en">Ready-to-copy prompt</span></div>
</div>
